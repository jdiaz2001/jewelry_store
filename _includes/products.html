<section id="catalog" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h2 class="text-3xl font-bold text-center text-gray-800 mb-10">Catálogo de Productos</h2>

  <div class="flex flex-col md:flex-row gap-8">

    <!-- Sidebar filters -->
    <aside class="w-full md:w-56 shrink-0">
      <div class="bg-white rounded-2xl shadow-md p-5 sticky top-6">
        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Filtrar por tipo</h3>
        <ul class="space-y-2">
          <li>
            <button
              class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 bg-emerald-100 text-emerald-700"
              data-category="todos"
              aria-pressed="true"
            >
              Todos
            </button>
          </li>
          <li>
            <button
              class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 text-gray-600 hover:bg-gray-100"
              data-category="aretes"
              aria-pressed="false"
            >
              Aretes
            </button>
          </li>
          <li>
            <button
              class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 text-gray-600 hover:bg-gray-100"
              data-category="dijes"
              aria-pressed="false"
            >
              Dijes
            </button>
          </li>
          <li>
            <button
              class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 text-gray-600 hover:bg-gray-100"
              data-category="anillos"
              aria-pressed="false"
            >
              Anillos
            </button>
          </li>
        </ul>
      </div>
    </aside>

    <!-- Product grid -->
    <div id="product-grid" class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {% for item in site.data.catalog %}
      <div class="product-card group bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-shadow duration-300" data-category="{{ item.category }}">
        <div class="aspect-square overflow-hidden">
          <img
            src="{{ '/images/' | append: item.ref_code | append: '.jpg' | relative_url }}"
            alt="{{ item.description }}"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            loading="lazy"
          />
        </div>
        <div class="p-4 flex flex-col gap-1">
          <span class="text-xs font-mono text-gray-400 uppercase tracking-wide">{{ item.ref_code }}</span>
          <h3 class="text-sm font-semibold text-gray-700 leading-snug">{{ item.description }}</h3>
          <span class="text-lg font-bold text-emerald-600 mt-1">{{ item.price }}</span>
        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</section>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const buttons = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('.product-card');

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        const category = this.dataset.category;

        // Update button styles
        buttons.forEach(function (b) {
          b.className = 'filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 text-gray-600 hover:bg-gray-100';
          b.setAttribute('aria-pressed', 'false');
        });
        this.className = 'filter-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors duration-200 bg-emerald-100 text-emerald-700';
        this.setAttribute('aria-pressed', 'true');

        // Filter cards
        cards.forEach(function (card) {
          if (category === 'todos' || card.dataset.category === category) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  });
</script>
